services:
  - type: web
    name: short-video-bao-kuan-generator
    env: python
    rootDir: short_video_pwa
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_BASE
        value: https://api.openai.com/v1
